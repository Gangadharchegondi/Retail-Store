<!-- Product Card Component -->
<div class="h-full bg-white rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden border border-slate-100 group cursor-pointer">
    <!-- Image Container -->
    <div class="relative h-48 bg-gradient-to-br from-slate-100 to-slate-200 overflow-hidden flex items-center justify-center">
        <img src="{{ product.image or '/static/images/placeholder.png' }}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" />
        
        <!-- Badge -->
        {% if product.discount %}
        <div class="absolute top-3 right-3 bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">
            -{{ product.discount }}%
        </div>
        {% endif %}
        
        <!-- Stock Status -->
        <div class="absolute bottom-3 left-3">
            {% if product.stock > 0 %}
            <span class="bg-green-500/90 text-white text-xs px-2 py-1 rounded-full font-medium">In Stock</span>
            {% else %}
            <span class="bg-gray-500/90 text-white text-xs px-2 py-1 rounded-full font-medium">Out of Stock</span>
            {% endif %}
        </div>
    </div>
    
    <!-- Content -->
    <div class="p-4">
        <p class="text-xs text-slate-500 mb-1 uppercase tracking-wide">{{ product.category }}</p>
        <h3 class="text-sm font-bold text-slate-900 mb-2 line-clamp-2 group-hover:text-emerald-700 transition">{{ product.name }}</h3>
        
        <!-- Price -->
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg font-bold text-slate-900">₹{{ product.price }}</span>
            {% if product.original_price %}
            <span class="text-sm text-slate-500 line-through">₹{{ product.original_price }}</span>
            {% endif %}
        </div>
        
        <!-- Weight/Details -->
        <div class="text-xs text-slate-600 mb-3">
            <i class="fas fa-balance-scale mr-1"></i>{{ product.weight }}g
        </div>
        
        <!-- Action Button -->
        <button onclick="addToCart('{{ product.id }}')" class="w-full bg-gradient-to-r from-emerald-700 to-amber-500 text-white py-2 rounded-lg font-semibold text-sm hover:shadow-lg transition-all duration-200 active:scale-95">
            <i class="fas fa-plus mr-2"></i>Add to Cart
        </button>
    </div>
</div>
